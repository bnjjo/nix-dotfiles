[settings]
animate = false            # set to false to disable animations
animation_duration = 6.9  # animation duration (in seconds)
animation_fps = 100.0     # frames per second

# Space activation:
default_disable = false

# Mouse/focus:
focus_follows_mouse = true   # if true, moving the mouse into a window focuses it
mouse_follows_focus = true   # if true, when focus changes, move the mouse to the focused window
mouse_hides_on_focus = true  # if true, hide the mouse cursor after focusing a window
# focus_follows_mouse_disable_hotkey = "Fn"  # (accepts modifier-only like "Fn" or full hotkey like "Ctrl + A")

# Bundle IDs that should not trigger workspace switches or focus changes.
# Example: ["com.apple.Spotlight", "com.raycast.macos"]
auto_focus_blacklist = []

# Commands run on startup.
# Tip: `rift-cli subscribe ...` can call your script on events (see wiki for examples).
# run_on_start = ["open -a 'Terminal'"]
run_on_start = []

# Reload the config automatically when the file changes.
hot_reload = true

[settings.layout]
# Layouts
# See https://github.com/acsandmann/rift/wiki/Config#layouts
# If omitted, defaults to "traditional" (manual tiling like i3/sway)
mode = "bsp"  # traditional|bsp|master_stack

[settings.layout.master_stack]
# Master/stack tuning (only used when mode = "master_stack").
master_ratio = 0.5    # fraction of screen for master area
master_count = 1      # number of windows kept in master area
master_side = "left"  # left|right|top|bottom
new_window_placement = "stack"  # master|stack|focused

[settings.layout.scrolling]
# Scrolling layout tuning (only used when mode = "scrolling").
column_width_ratio = 0.7         # default active-column width (0..1)
min_column_width_ratio = 0.3     # min bounds for resize commands
max_column_width_ratio = 0.9     # max bounds for resize commands
alignment = "center"             # left|center|right
focus_navigation_style = "niri"  # niri|anchored
# animate = false

[settings.layout.scrolling.gestures]
# Optional gestures that only apply when the scrolling layout is active.
enabled = false
invert_horizontal = false
fingers = 3
propagate_to_workspace_swipe = false

[settings.layout.stack]
# Stack cosmetics (used by container-based layouts).
stack_offset = 40.0  # in px; 0.0 fully overlaps stacked windows.
default_orientation = "perpendicular"

[settings.layout.gaps]
# Gap configuration for tiles and displays.
[settings.layout.gaps.outer]
top    = 8
left   = 14
bottom = 14
right  = 14

[settings.layout.gaps.inner]
horizontal = 15
vertical   = 15

# Per-display overrides use a display UUID key ( https://github.com/acsandmann/rift/wiki/Config#settingslayoutgaps ):
# [settings.layout.gaps.per_display."<uuid>".outer]
# top = 16
# [settings.layout.gaps.per_display."<uuid>".inner]
# horizontal = 8

[settings.ui.menu_bar]
enabled = true            # enable menu bar workspace indicators
show_empty = true         # shows empty workspaces, not recommended if you have many active workspaces
mode = "all"              # choose between drawing every workspace or only the active workspace
active_label = "index"    # when showing workspaces as labels, choose which label to render (index|name) 
display_style = "layout"  # when displaying workspaces, display either the layout preview or a set of labels (layout|label)

[settings.ui.stack_line]
# experimental stack line indicator
enabled = false

horiz_placement = "top"  # line placement in a horizontal stack (top|bottom)
vert_placement = "left"  # line placement in a vertical stack (left|right)
thickness = 20.0         # indicator thickness (in px)
spacing = 1.0            # spacing between stack line and window edges (in px)

[settings.ui.mission_control]
enabled = false
fade_enabled = false
fade_duration_ms = 180.0

[settings.gestures]
# Trackpad swipe settings (workspace switching).
enabled = false
invert_horizontal_swipe = false
skip_empty = true
fingers = 3
haptics_enabled = true

[settings.window_snapping]
# Drag-swap overlap threshold (0.0..1.0).
drag_swap_fraction = 0.3

[virtual_workspaces]
# Virtual workspace rules and persistence.
enabled = true                       # if false, rift behaves like a single-workspace tiler
default_workspace_count = 5          # number of workspaces to create on startup
auto_assign_windows = true
preserve_focus_per_workspace = true  # remember last-focused window per workspace
workspace_auto_back_and_forth = false
reapply_app_rules_on_title_change = false

# workspace_rules allow per-workspace layout overrides: (https://github.com/acsandmann/rift/wiki/Config#app_rules-object-fields)
# workspace_rules = [{ workspace = 1, layout = "bsp" }]
workspace_rules = []

# Default workspace index (0-based). Uncomment to change.
# default_workspace = 0

# Named workspace labels (must not exceed default_workspace_count).
workspace_names = [
	"browsers",
	"editors"
]

# App rules for auto-assignment; field descriptions live in the wiki. (https://github.com/acsandmann/rift/wiki/Config#app_rules-object-fields)
# Example: app_rules = [{ app_id = "com.apple.Safari", workspace = 1, floating = true }]
app_rules = []

[modifier_combinations]
# Shared modifier aliases used in [keys].
comb1 = "Alt + Shift"

[keys]
# Key syntax + full command list: https://github.com/acsandmann/rift/wiki/Config#commands

"Alt + ;" = "toggle_space_activated"

"Alt + H" = { move_focus = "left" }
"Alt + J" = { move_focus = "down" }
"Alt + K" = { move_focus = "up" }
"Alt + L" = { move_focus = "right" }

"comb1 + H" = { move_node = "left" }
"comb1 + J" = { move_node = "down" }
"comb1 + K" = { move_node = "up" }
"comb1 + L" = { move_node = "right" }

"Alt + 1" = { switch_to_workspace = 0 }
"Alt + 2" = { switch_to_workspace = 1 }
"Alt + 3" = { switch_to_workspace = 2 }
"Alt + 4" = { switch_to_workspace = 3 }
"Alt + 5" = { switch_to_workspace = 4 }

# "Alt + b" = { switch_to_workspace = 0 }
# "Alt + m" = { switch_to_workspace = 1 }
# "Alt + w" = { switch_to_workspace = 2 }
# "Alt + v" = { switch_to_workspace = 3 }
# "Alt + z" = { switch_to_workspace = 4 }

"comb1 + 1" = { bring_window_to_workspace = 0 }
"comb1 + 2" = { bring_window_to_workspace = 1 }
"comb1 + 3" = { bring_window_to_workspace = 2 }
"comb1 + 4" = { bring_window_to_workspace = 3 }
"comb1 + 5" = { bring_window_to_workspace = 4 }
"comb1 + b" = { bring_window_to_workspace = 0 }
"comb1 + m" = { bring_window_to_workspace = 1 }
"comb1 + w" = { bring_window_to_workspace = 2 }
"comb1 + v" = { bring_window_to_workspace = 3 }
"comb1 + z" = { bring_window_to_workspace = 4 }

"Alt + Tab" = "next_window"
"comb1 + Tab" = "prev_window"

# Additional helper bindings; see the wiki command list for context.
"Alt + Shift + Left" = { join_window = "left" }
"Alt + Shift + Right" = { join_window = "right" }
"Alt + Shift + Up" = { join_window = "up" }
"Alt + Shift + Down" = { join_window = "down" }
# "Alt + Comma" = "toggle_stack"
"Alt + N" = "toggle_orientation"
"Alt + Ctrl + E" = "unjoin_windows"

"Alt + O" = "toggle_window_floating"
"Alt + F" = "toggle_fullscreen_within_gaps"
"Alt + Shift + F" = "toggle_fullscreen"
"comb1 + Ctrl + Space" = "toggle_focus_floating"  # briefly bring focus to floating window

"Alt + Shift + Equal" = "resize_window_grow"
"Alt + Shift + Minus" = "resize_window_shrink"

# Display / mission control examples (see wiki for full set):
# "Alt + Shift + A" = { move_mouse_to_display = 0 }
# "Alt + Shift + F" = { focus_display = "right" }
# "Alt + Ctrl + Left" = { move_window_to_display = { selector = "left" } }
# "Alt + Ctrl + M" = "show_mission_control_all"

"Alt + Enter" = { "exec" = ["/bin/bash", "-c", "open -a \"/System/Applications/Utilities/Terminal.app\""] }

# debug options, you may need these when troubleshooting/reporting issues
"Alt + Shift + D" = "debug"
"Alt + Ctrl + S" = "serialize"
